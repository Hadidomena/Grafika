name: Test Project

permissions: read-all

on:
    push:
        branches: [ main ]

jobs:
  test-Part_1:
    runs-on: ubuntu-latest
    env:
      RAYLIB_PATH: ${{ github.workspace }}/raylib/src
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Zig
        shell: bash
        run: |
            set -euo pipefail
            zig_url="$(python3 -c "import json,urllib.request;print(json.load(urllib.request.urlopen('https://ziglang.org/download/index.json'))['master']['x86_64-linux']['tarball'])")"
            curl -L "$zig_url" -o zig.tar.xz
            tar -xf zig.tar.xz
            zig_dir="$(basename "$zig_url" .tar.xz)"
            echo "$PWD/$zig_dir" >> "$GITHUB_PATH"
            "$PWD/$zig_dir/zig" version

      - name: Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl-dev libx11-dev libxrandr-dev libxi-dev libxxf86vm-dev libxinerama-dev libxcursor-dev

      - name: Cache Raylib
        id: cache-raylib
        uses: actions/cache@v5
        with:
          path: raylib
          key: ${{ runner.os }}-raylib-master

      - name: Copy Raylib
        if: steps.cache-raylib.outputs.cache-hit != 'true'
        run: git clone --depth 1 https://github.com/raysan5/raylib.git

      - name: Build Raylib
        if: steps.cache-raylib.outputs.cache-hit != 'true'
        run: |
          cd raylib/src
          make PLATFORM=PLATFORM_DESKTOP        

      - name: Cache Zig Build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/zig
            zig-cache
            zig-out
          key: ${{ runner.os }}-zig-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-zig-

      - name: Run Tests
        run: cd Part_1 && zig build test

  test-Part_2:
    runs-on: ubuntu-latest
    env:
      RAYLIB_PATH: ${{ github.workspace }}/raylib/src
